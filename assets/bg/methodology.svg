<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1B3A6B" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1" fill="#1B3A6B" fill-opacity="0.10"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#F7F8FA" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
