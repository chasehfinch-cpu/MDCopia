<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7F8FA"/>
      <stop offset="0.65" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hgWash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#hg)"/>
  <g stroke="#1B3A6B" stroke-width="0.6" stroke-opacity="0.08" fill="none">
    <!-- Architectural perspective lines, vanishing point upper-right -->
    <line x1="0" y1="1080" x2="1920" y2="180"/>
    <line x1="0" y1="980" x2="1920" y2="220"/>
    <line x1="0" y1="880" x2="1920" y2="260"/>
    <line x1="0" y1="780" x2="1920" y2="300"/>
    <line x1="0" y1="680" x2="1920" y2="340"/>
    <line x1="0" y1="580" x2="1920" y2="380"/>
    <line x1="0" y1="480" x2="1920" y2="420"/>
    <!-- Vertical structural lines -->
    <line x1="240" y1="0" x2="240" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1320" y1="0" x2="1320" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>
  <!-- Right-side wash to ensure CTA region is clean -->
  <rect width="1920" height="1080" fill="url(#hgWash)"/>
</svg>
