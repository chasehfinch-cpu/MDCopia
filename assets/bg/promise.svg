<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2647"/>
      <stop offset="0.5" stop-color="#1B3A6B"/>
      <stop offset="1" stop-color="#0F2647"/>
    </linearGradient>
    <linearGradient id="filament" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C5A55A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#C5A55A" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C5A55A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="480" fill="url(#pg)"/>
  <!-- Curving gold filaments -->
  <g fill="none" stroke="url(#filament)" stroke-width="0.8">
    <path d="M 0 80 Q 480 40 960 120 T 1920 80"/>
    <path d="M 0 200 Q 480 260 960 180 T 1920 220"/>
    <path d="M 0 360 Q 480 320 960 400 T 1920 360"/>
    <path d="M 0 440 Q 480 400 960 460 T 1920 420"/>
  </g>
  <!-- Subtle starfield -->
  <g fill="#FFFFFF" fill-opacity="0.18">
    <circle cx="120" cy="80" r="0.7"/>
    <circle cx="380" cy="160" r="0.5"/>
    <circle cx="640" cy="60" r="0.8"/>
    <circle cx="900" cy="200" r="0.6"/>
    <circle cx="1180" cy="100" r="0.7"/>
    <circle cx="1440" cy="180" r="0.5"/>
    <circle cx="1700" cy="80" r="0.6"/>
    <circle cx="220" cy="380" r="0.5"/>
    <circle cx="500" cy="420" r="0.7"/>
    <circle cx="780" cy="360" r="0.5"/>
    <circle cx="1080" cy="400" r="0.6"/>
    <circle cx="1380" cy="380" r="0.7"/>
    <circle cx="1640" cy="420" r="0.5"/>
  </g>
</svg>
