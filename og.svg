<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F8FA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C5A55A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#C5A55A"/>
      <stop offset="1" stop-color="#C5A55A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="630" fill="#1B3A6B"/>
  <text x="600" y="320" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-style="italic" font-weight="700" font-size="160">
    <tspan fill="#1B3A6B">MD</tspan><tspan fill="#C5A55A">Copia</tspan>
  </text>
  <line x1="450" y1="370" x2="750" y2="370" stroke="url(#accent)" stroke-width="2"/>
  <text x="600" y="430" text-anchor="middle"
        font-family="Source Sans 3, Helvetica, sans-serif"
        font-size="32" fill="#374151">
    Confidential, data-driven physician practice valuations.
  </text>
  <text x="600" y="475" text-anchor="middle"
        font-family="Source Sans 3, Helvetica, sans-serif"
        font-size="20" fill="#6B7280" letter-spacing="3">
    www.mdcopia.com
  </text>
</svg>
